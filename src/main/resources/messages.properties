#----------------- Validaciones para la entidad Client ------------------------

NotBlank.client.name=es requerido
Size.client.name=debe tener entre 3 y 50 caracteres

NotBlank.client.email=es obligatorio
Email.client.email=debe tener un formato de correo válido

NotBlank.client.clientNumId=es obligatorio para identificar al cliente
Pattern.client.clientNumId=debe tener exactamente 8 números y una letra

#----------------- Validaciones para la entidad Product ----------------------

NotBlank.product.productName=es requerido
Size.product.productName=debe tener entre 4 y 50 caracteres

NotBlank.product.productDescription=es requerido

NotNull.product.productPrice=no puede ser null
DecimalMin.product.productPrice=valor mínimo 0.01

NotBlank.product.productSKU=es requerido
Pattern.product.productSKU=formato incorrecto [XXX-NNNN/N-N/N]


#------------------ Validaciones para la entidad Order ------------------------

NotNull.order.client=el cliente es obligatorio
NotEmpty.order.product=el pedido debe contener al menos un producto

#------------------ Validaciones para la entidad User -------------------------

ExistsByUsername.user.username=Nombre de usuario no disponible, por favor, elija otro
NotBlank.user.username=es obligatorio
NotBlank.user.password=es obligatorio